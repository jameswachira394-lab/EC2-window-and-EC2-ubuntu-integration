name: Build and Deploy Trading System

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # 1. CI: Build + Validate Forex System
  # ─────────────────────────────────────────────
  build-forex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r forex_system/requirements.txt

      - name: Syntax check
        run: python -m py_compile forex_system/main.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./forex_system
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/forex-system:latest

  # ─────────────────────────────────────────────
  # 2. CD: Deploy Forex System to EC2
  # ─────────────────────────────────────────────
  deploy-forex:
    needs: build-forex
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/forex-system:latest

            echo "Stopping old container..."
            docker stop forex-system || true
            docker rm forex-system || true

            echo "Starting updated container..."
            docker run -d \
              --name forex-system \
              -p 8000:8000 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/forex-system:latest

            echo "Deployment complete."

  # ─────────────────────────────────────────────
  # 3. CI: Validate MT5 Executor (Windows only)
  # ─────────────────────────────────────────────
  validate-mt5:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r mt5-executor/requirements.txt

      - name: Syntax check
        run: python -m py_compile mt5-executor/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mt5-executor
          path: mt5-executor/